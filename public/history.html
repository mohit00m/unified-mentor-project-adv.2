<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Booking History - Gas Agency System</title>
    <link rel="stylesheet" href="css/style.css" />

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"
        }
      }
    </script>
</head>

<body>
    <div id="navbar"></div>

    <div class="wrap">
      <header>
        <h1>Booking History</h1>
      </header>
      <main class="card">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Qty</th>
              <th>Address</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="my-bookings-body">
              <tr><td colspan="4">Loading your bookings...</td></tr>
          </tbody>
        </table>
        <p class="muted">Your bookings are shown here (requires login).</p>
      </main>
      <footer class="foot"><a href="index.html">Home</a></footer>
    </div>

    <script>
      fetch("navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
        });
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "firebase/firestore";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyANcedC5OX5G05nEQoiyrLWW-yHJrH4oAo",
            authDomain: "heritage-gas-project.firebaseapp.com",
            projectId: "heritage-gas-project",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const tableBody = document.getElementById('my-bookings-body');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // Create a query to get only the current user's bookings
                    // Note: This requires a Firestore index (Firebase will provide a link in the console if needed)
                    const q = query(
                        collection(db, "bookings"), 
                        where("userId", "==", user.uid),
                        orderBy("timestamp", "desc")
                    );
                    
                    const querySnapshot = await getDocs(q);
                    tableBody.innerHTML = ""; // Clear the loading row

                    if (querySnapshot.empty) {
                        tableBody.innerHTML = "<tr><td colspan='4'>No bookings found.</td></tr>";
                        return;
                    }

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        // Format the Firestore timestamp to a readable date
                        const dateString = data.timestamp ? data.timestamp.toDate().toLocaleDateString() : "Processing...";
                        
                        tableBody.innerHTML += `
                            <tr>
                                <td>${dateString}</td>
                                <td>${data.quantity}</td>
                                <td>${data.address}</td>
                                <td><b style="color: ${data.status === 'Pending' ? 'orange' : 'green'}">${data.status}</b></td>
                            </tr>
                        `;
                    });
                } catch (error) {
                    console.error("Error fetching bookings:", error);
                    tableBody.innerHTML = "<tr><td colspan='4'>Error loading data. Check console for index link.</td></tr>";
                }
            } else {
                // Not logged in? Go back to login
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
